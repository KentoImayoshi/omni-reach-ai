services:

  db:
    image: postgres:15
    container_name: omnireach_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnireach}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: omnireach_redis
    ports:
      - "6379:6379"


  web:
    build: .
    container_name: omnireach_web
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis


  worker:
    build: .
    container_name: omnireach_worker
    command: celery -A core worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis


volumes:
  postgres_data:
